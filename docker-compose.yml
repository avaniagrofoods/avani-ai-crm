version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: avani_postgres
    environment:
      POSTGRES_USER: avani_user
      POSTGRES_PASSWORD: avani_password
      POSTGRES_DB: avani_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: avani_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
